<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Video Box Manager</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="page">
    <header class="hero">
      <h1>Video Box Manager</h1>
      <p>Quản lý playlist quảng cáo trên box trong LAN</p>
    </header>

    <section class="panel">
      <h2>Thư viện video</h2>
      <div class="scan-row">
        <input id="scanDir" type="text" placeholder="/videos" />
        <button id="btnScan">Quét thư mục</button>
      </div>
      <div id="videoList" class="list"></div>
    </section>

    <section class="panel">
      <h2>Thư mục trên box và Upload</h2>
      <div class="scan-row">
        <input id="browseDir" type="text" placeholder="/videos" />
        <button id="btnBrowse">Mở thư mục</button>
      </div>
      <div id="dirList" class="list"></div>
      <div class="upload-row">
        <input id="uploadFile" type="file" accept="video/*" />
        <button id="btnUpload">Upload vào thư mục đang mở</button>
      </div>
    </section>

    <section class="panel">
      <h2>Playlist</h2>
      <div class="controls-row">
        <button id="btnStart">Start</button>
        <button id="btnPause">Pause/Resume</button>
        <button id="btnNext">Next</button>
        <button id="btnStop" class="danger">Stop</button>
      </div>
      <div id="statusBox" class="status"></div>
      <div id="playlistList" class="list"></div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
